<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9 BAR - Specialty Coffee</title>
    <meta name="description" content="9 BAR Premium Specialty Coffee">
    <meta name="theme-color" content="#0a0a0a">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1410 100%);
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 48px 32px;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
            animation: fadeIn 0.6s ease-in;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 600;
            animation: fadeIn 0.6s ease-in 0.1s both;
        }
        p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-in 0.2s both;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.2);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .loading-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            animation: fadeIn 0.6s ease-in 0.3s both;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">☕</div>
        <h1>9 BAR</h1>
        <p>Premium Specialty Coffee</p>
        <div class="spinner"></div>
        <div class="loading-text" id="status">Loading...</div>
    </div>

    <script>
        // For development/testing: use localhost
        // For production: use 9bar.coffee backend
        const DEV_MODE = false; // Set to true for local development
        const BACKEND_URL = DEV_MODE ? 'http://localhost:3000' : 'https://9bar.coffee';
        
        // Initialize Capacitor plugins if available
        if (window.Capacitor) {
            console.log('Capacitor initialized');
        }

        // Simple loading indicator
        let dots = 0;
        setInterval(() => {
            dots = (dots + 1) % 4;
            document.getElementById('status').textContent = 'Loading' + '.'.repeat(dots);
        }, 500);

        // Redirect to backend after a brief delay
        setTimeout(() => {
            document.getElementById('status').textContent = 'Opening app...';
            window.location.href = BACKEND_URL;
        }, 2000);

        // Also try to load the app in an iframe or webview
        // This allows for better app integration
        document.addEventListener('DOMContentLoaded', () => {
            console.log('App loaded, redirecting to backend...');
        });
    </script>
</body>
</html>
